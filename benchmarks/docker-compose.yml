services:
  node1:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["--headless", "--port", "1337", "--name", "node1"]
    environment:
      - AIMP_NOISE_REQUIRED=false
      - AIMP_METRICS_PORT=9090
      - AIMP_PEER_RATE_LIMIT=10000
      - AIMP_PEER_RATE_BURST=20000
    networks:
      aimp_mesh:
        ipv4_address: 172.30.0.11
    ports:
      - "9091:9090"

  node2:
