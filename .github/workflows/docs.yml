name: Docs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: aimp_node

      - name: Generate rustdoc
        run: cargo doc --manifest-path aimp_node/Cargo.toml --no-deps

      - name: Add redirect index.html
        run: echo '<meta http-equiv="refresh" content="0; url=aimp_node/index.html">' > target/doc/index.html

      - name: Copy to docs/
        run: |
          rm -rf docs
          cp -r target/doc docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
